services:
  - type: web
    name: gigshield-backend
    env: python
    plan: free
    buildCommand: "cd backend && pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: REDIS_URL
        value: internal # Render automatically resolves this if a redis instance is attached

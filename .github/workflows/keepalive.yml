name: Keep Render Backend Awake

on:
  schedule:
    - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch: # Allows manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Health Endpoint
        run: curl -sSf https://gigshield-backend-6bzb.onrender.com/api/health || exit 0
